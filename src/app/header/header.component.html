<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">
    <div class="logo">
      <a routerLink="/" (click)="closeMenu()">
        <img src="/assets/images/Logo.jpg" alt="Soft Technology Sarl">
        <span class="logo-text">
          <span class="logo-name">Soft Technology</span>
          <span class="logo-tag">Solutions IT & Réseaux</span>
        </span>
      </a>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen" aria-label="Toggle menu" [attr.aria-expanded]="isMenuOpen">
      <span class="hamburger"></span>
      <span class="hamburger"></span>
      <span class="hamburger"></span>
    </button>

    <nav class="nav" [class.open]="isMenuOpen">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Accueil</a></li>
        <li><a routerLink="/catalogues" routerLinkActive="active" (click)="closeMenu()">Catalogue</a></li>
        <li><a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Nos services</a></li>
        <li><a routerLink="/a-propos" routerLinkActive="active" (click)="closeMenu()">À propos</a></li>
        <li><a routerLink="/nous-contacter" routerLinkActive="active" (click)="closeMenu()">Nous contacter</a></li>
        <li class="nav-cta">
          <a routerLink="/nous-contacter" class="cta-btn" (click)="closeMenu()">
            Demander un devis
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <div class="overlay" [class.open]="isMenuOpen" (click)="closeMenu()"></div>
</header>

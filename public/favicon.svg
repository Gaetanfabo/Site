<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2874a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#blueGradient)"/>

  <!-- Letter S -->
  <text x="50" y="75" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="800" fill="white" text-anchor="middle">S</text>
</svg>
